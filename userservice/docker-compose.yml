services:

  postgres:
    image: postgres:16

    container_name: postgres

    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  user-service:
    build: .

    container_name: user-service

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fitness
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

volumes:
  postgres_data: